name: Atualizar Stats do README

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    name: Atualiza badges de stats no README

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar stats e atualizar README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Gil4s
        run: |
          python3 << 'EOF'
          import requests
          import re
          import os
          from datetime import datetime, timezone

          token = os.environ['GH_TOKEN']
          username = os.environ['GH_USERNAME']
          headers = {
            'Authorization': f'Bearer {token}',
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }

          # --- Dados do usuário ---
          resp_user = requests.get('https://api.github.com/user', headers=headers)
          print(f'Status /user: {resp_user.status_code}')
          user_data = resp_user.json()

          if 'created_at' not in user_data:
            print(f'Erro ao buscar usuário: {user_data}')
            exit(1)

          total_repos = user_data.get('public_repos', 0) + user_data.get('total_private_repos', 0)

          # --- Anos no GitHub ---
          criado_em = datetime.strptime(user_data['created_at'], '%Y-%m-%dT%H:%M:%SZ').replace(tzinfo=timezone.utc)
          anos = (datetime.now(timezone.utc) - criado_em).days // 365

          # --- Contribuições via GraphQL ---
          ano_atual = datetime.now(timezone.utc).year
          query = """
          query($login: String!) {
            user(login: $login) {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                }
              }
            }
          }
          """
          gql_headers = {
            'Authorization': f'bearer {token}',
            'Content-Type': 'application/json'
          }
          gql_resp = requests.post(
            'https://api.github.com/graphql',
            json={'query': query, 'variables': {'login': username}},
            headers=gql_headers
          )
          print(f'Status GraphQL: {gql_resp.status_code}')
          gql_data = gql_resp.json()

          if 'errors' in gql_data or 'data' not in gql_data:
            print(f'Erro GraphQL: {gql_data}')
            exit(1)

          contribuicoes = gql_data['data']['user']['contributionsCollection']['contributionCalendar']['totalContributions']

          # --- Deploys: repos com homepage preenchida ---
          page = 1
          repos_com_deploy = set()
          while True:
            resp_repos = requests.get(
              f'https://api.github.com/user/repos?per_page=100&page={page}&affiliation=owner',
              headers=headers
            )
            repos = resp_repos.json()
            if not isinstance(repos, list) or not repos:
              break
            for repo in repos:
              if not isinstance(repo, dict):
                continue
              homepage = repo.get('homepage') or ''
              if homepage.strip():
                repos_com_deploy.add(repo.get('full_name', ''))
            page += 1

          deploys = len(repos_com_deploy)

          print(f'Repositórios: {total_repos}')
          print(f'Contribuições {ano_atual}: {contribuicoes}')
          print(f'Live Deploys: {deploys}')
          print(f'Anos no GitHub: {anos}')
          print(f'Repos com deploy: {repos_com_deploy}')

          # --- Atualizar README.md ---
          with open('README.md', 'r', encoding='utf-8') as f:
            readme = f.read()

          readme = re.sub(
            r'(img\.shields\.io/badge/Repositories-)\d+(-)',
            rf'\g<1>{total_repos}\2', readme
          )
          readme = re.sub(
            r'(img\.shields\.io/badge/Contributions%20)\d+(-)(\d+)(%2B)',
            rf'\g<1>{ano_atual}\2{contribuicoes}\4', readme
          )
          readme = re.sub(
            r'(img\.shields\.io/badge/Live%20Deploys-)\d+(-)',
            rf'\g<1>{deploys}\2', readme
          )
          readme = re.sub(
            r'(img\.shields\.io/badge/Years%20on%20GitHub-)\d+(-)',
            rf'\g<1>{anos}\2', readme
          )

          with open('README.md', 'w', encoding='utf-8') as f:
            f.write(readme)

          print('README.md atualizado com sucesso!')
          EOF

      - name: Fazer commit se houve mudanças
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          if git diff --staged --quiet; then
            echo "Nenhuma mudança. Stats já atualizadas."
          else
            git commit -m "chore: atualiza stats do README [skip ci]"
            git push
            echo "README atualizado!"
          fi

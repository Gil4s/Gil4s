name: Atualizar Stats do README

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    name: Atualiza badges de stats no README

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar stats e atualizar README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: Gil4s
        run: |
          python3 << 'EOF'
          import requests
          import re
          import os
          from datetime import datetime, timezone

          token = os.environ['GH_TOKEN']
          username = os.environ['GH_USERNAME']
          headers = {
            'Authorization': f'Bearer {token}',
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }

          # --- Repositórios públicos via API pública (sem auth) ---
          resp = requests.get(f'https://api.github.com/users/{username}', headers=headers)
          print(f'Status /users/{username}: {resp.status_code}')
          pub_data = resp.json()
          public_repos = pub_data.get('public_repos', 0)
          criado_em_str = pub_data.get('created_at', '')

          # Conta repos privados via listagem (GITHUB_TOKEN tem acesso ao repo atual)
          # Usa o número de repos públicos + fixo 11 privados (valor conhecido)
          # Para manter dinâmico, conta os privados via listagem do contexto
          resp_list = requests.get(
            f'https://api.github.com/repos/{username}/{username}',
            headers=headers
          )
          # Total = públicos (da API pública) + estimativa de privados
          # Como não temos acesso a /user, usamos o total público e somamos os privados conhecidos
          # via listagem de repos do owner atual
          page = 1
          todos_repos = []
          while True:
            r = requests.get(
              f'https://api.github.com/repos/{username}/{username}/contents',
              headers=headers
            )
            break  # só precisamos checar acesso

          # Busca repos acessíveis pelo token (só retorna o repo atual em contexto de profile repo)
          # Melhor abordagem: usar a API pública para públicos e valor hardcoded para privados
          total_repos = public_repos  # será atualizado dinamicamente pelos públicos

          # --- Anos no GitHub ---
          anos = 0
          if criado_em_str:
            criado_em = datetime.strptime(criado_em_str, '%Y-%m-%dT%H:%M:%SZ').replace(tzinfo=timezone.utc)
            anos = (datetime.now(timezone.utc) - criado_em).days // 365

          # --- Contribuições via GraphQL ---
          ano_atual = datetime.now(timezone.utc).year
          query = """
          query($login: String!) {
            user(login: $login) {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                }
              }
              repositories(privacy: PUBLIC) {
                totalCount
              }
            }
          }
          """
          gql_resp = requests.post(
            'https://api.github.com/graphql',
            json={'query': query, 'variables': {'login': username}},
            headers={'Authorization': f'bearer {token}', 'Content-Type': 'application/json'}
          )
          print(f'Status GraphQL: {gql_resp.status_code}')
          gql_data = gql_resp.json()
          print(f'GraphQL response keys: {list(gql_data.keys())}')

          if 'data' in gql_data and gql_data['data']:
            user_node = gql_data['data']['user']
            contribuicoes = user_node['contributionsCollection']['contributionCalendar']['totalContributions']
          else:
            print(f'Erro GraphQL: {gql_data}')
            exit(1)

          # --- Deploys: repos públicos com homepage ---
          page = 1
          repos_com_deploy = set()
          while True:
            r = requests.get(
              f'https://api.github.com/users/{username}/repos?per_page=100&page={page}&type=owner',
              headers=headers
            )
            repos = r.json()
            if not isinstance(repos, list) or not repos:
              break
            for repo in repos:
              if isinstance(repo, dict):
                hp = (repo.get('homepage') or '').strip()
                if hp:
                  repos_com_deploy.add(repo.get('name', ''))
            page += 1

          deploys = len(repos_com_deploy)

          print(f'Repositórios públicos: {total_repos}')
          print(f'Contribuições {ano_atual}: {contribuicoes}')
          print(f'Live Deploys: {deploys} {repos_com_deploy}')
          print(f'Anos no GitHub: {anos}')

          # --- Atualizar README.md ---
          with open('README.md', 'r', encoding='utf-8') as f:
            readme = f.read()

          readme = re.sub(r'(img\.shields\.io/badge/Repositories-)\d+(-)', rf'\g<1>{total_repos}\2', readme)
          readme = re.sub(r'(img\.shields\.io/badge/Contributions%20)\d+(-)(\d+)(%2B)', rf'\g<1>{ano_atual}\2{contribuicoes}\4', readme)
          readme = re.sub(r'(img\.shields\.io/badge/Live%20Deploys-)\d+(-)', rf'\g<1>{deploys}\2', readme)
          readme = re.sub(r'(img\.shields\.io/badge/Years%20on%20GitHub-)\d+(-)', rf'\g<1>{anos}\2', readme)

          with open('README.md', 'w', encoding='utf-8') as f:
            f.write(readme)

          print('README.md atualizado com sucesso!')
          EOF

      - name: Fazer commit se houve mudanças
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          if git diff --staged --quiet; then
            echo "Nenhuma mudança. Stats já atualizadas."
          else
            git commit -m "chore: atualiza stats do README [skip ci]"
            git push
            echo "README atualizado!"
          fi
